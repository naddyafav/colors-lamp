name: Lint and Test CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run HTMLHint
        run: npx htmlhint "**/*.html"
      - name: Run Stylelint
        run: npx stylelint "css/*.css"
      - name: Run ESLint
        run: npx eslint "js/*.js"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Jest tests
        run: npm test
